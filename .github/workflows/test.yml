name: Test Project
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v2
            - name: Install NodeJs
              uses: actions/setup-node@v6
              with:
                    node-version: '18'
            - name: Install Dependencies
              run: npm ci
            - name: Run Tests
              run: npm test
    
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Get Code
              uses: actions/checkout@v2
            - name: Install NodeJs
              uses: actions/setup-node@v6
              with:
                    node-version: '18'
            - name: Install Dependencies
              run: npm ci
            - name: Deploy
              run: echo "Deploying to production..."